<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1e3a8a">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <title>عمارت دیجیتال</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.25);
            --opaque-white: rgba(255, 255, 255, 0.9);
            --text-color: #ffffff;
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            --icon-size: 60px;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: var(--text-color);
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            transition: background 1s ease;
            touch-action: none;
        }

        body.day-theme {
            background: linear-gradient(180deg, #87CEEB 0%, #B0E2FF 100%);
            color: #1e3a8a;
        }
        body.day-theme .app-card {
            background: rgba(255, 255, 255, 0.4);
            border-color: rgba(255, 255, 255, 0.5);
            color: #1e3a8a;
        }
        body.day-theme .app-title { font-weight: 600; }

        body.night-theme {
            background: radial-gradient(circle at center, #1e3a8a 0%, #020617 100%);
            color: #ffffff;
        }

        .sky-elements {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            overflow: hidden;
        }

        .moon {
            position: absolute;
            top: 50px;
            right: 50px;
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            display: none;
        }
        body.night-theme .moon { display: block; }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0;
            animation: twinkle var(--duration) infinite ease-in-out;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.2); }
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: -1;
        }

        .container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .pages-wrapper {
            display: flex;
            width: 100%;
            height: 80%;
            transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .page {
            min-width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: repeat(var(--cols, 3), 1fr);
            grid-template-rows: repeat(var(--rows, 4), 1fr);
            gap: 0;
            padding: 40px 20px;
            box-sizing: border-box;
            position: relative;
        }

        .grid-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: grid;
            grid-template-columns: repeat(var(--cols, 3), 1fr);
            grid-template-rows: repeat(var(--rows, 4), 1fr);
            gap: 0;
            padding: 40px 20px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 0;
        }
        .editing .grid-overlay { opacity: 0.5; }
        .grid-cell {
            border: 1px dashed rgba(255,255,255,0.4);
            box-sizing: border-box;
        }

        .drop-preview {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border: 2px dashed rgba(255, 255, 255, 0.5);
            border-radius: 24px;
            pointer-events: none;
            display: none;
            z-index: 5;
        }

        .app-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 24px;
            text-align: center;
            text-decoration: none;
            color: inherit;
            box-shadow: var(--shadow);
            border: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            aspect-ratio: 1/1;
            margin: 10px;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), background 0.3s, border-color 0.3s, opacity 0.3s;
            user-select: none;
            touch-action: none;
        }

        @keyframes flyInCorner {
            0% { transform: scale(0) translate(var(--tw-tx, 0), var(--tw-ty, 0)); opacity: 0; }
            100% { transform: scale(1) translate(0, 0); opacity: 1; }
        }

        .fly-in {
            animation: flyInCorner 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        .app-card.dragging {
            z-index: 2000;
            opacity: 0.9;
            transform: scale(1.02);
            position: fixed;
            pointer-events: none;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .app-card.folder {
            background: rgba(255, 255, 255, 0.2);
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 4px;
            padding: 8px;
        }

        .folder-mini-icon {
            width: 100%;
            height: 100%;
            border-radius: 4px;
            background: var(--opaque-white);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.5rem;
        }
        .folder-mini-icon img { width: 80%; height: 80%; object-fit: contain; }

        .app-icon {
            font-size: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            width: var(--icon-size);
            height: var(--icon-size);
        }

        .app-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 14px;
            background: var(--opaque-white);
            padding: 2px;
        }

        .app-title {
            font-size: 0.75rem;
            margin-top: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 90%;
        }

        @keyframes jiggle {
            0% { transform: rotate(-1deg); }
            50% { transform: rotate(1deg); }
            100% { transform: rotate(-1deg); }
        }
        .editing .app-card:not(.dragging) {
            animation: jiggle 0.3s infinite;
        }

        .page-indicators {
            position: absolute;
            bottom: 40px;
            display: flex;
            gap: 8px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transition: all 0.3s;
        }

        .dot.active {
            background: #fff;
            transform: scale(1.2);
        }

        .settings-panel {
            position: fixed;
            bottom: -100%;
            left: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-top: 1px solid rgba(255,255,255,0.2);
            border-radius: 30px 30px 0 0;
            padding: 25px;
            box-sizing: border-box;
            transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 5000;
            color: #fff;
        }

        .settings-panel.open { bottom: 0 !important; }

        .settings-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .slider {
            flex-grow: 1;
            margin: 0 15px;
            accent-color: #3b82f6;
        }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            z-index: 4000;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .folder-modal {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 40px;
            width: 85%;
            max-width: 350px;
            padding: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }

        .folder-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 20px;
        }

        .folder-name-input {
            background: transparent;
            border: none;
            border-bottom: 2px solid rgba(255,255,255,0.5);
            color: #fff;
            font-size: 1.5rem;
            text-align: center;
            width: 80%;
            outline: none;
        }

        .color-presets {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .color-dot {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
        }
        .color-dot.active { border-color: #fff; }

        .folder-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            min-height: 100px;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider-round {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 34px;
        }
        .slider-round:before {
            position: absolute;
            content: "";
            height: 18px; width: 18px;
            left: 4px; bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider-round { background-color: #2196F3; }
        input:checked + .slider-round:before { transform: translateX(26px); }

        /* دکمه هنگام‌سازی شیشه‌ای */
        .sync-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 45px;
            height: 45px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1000;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .sync-btn:active {
            transform: scale(0.9) rotate(30deg);
            background: rgba(255, 255, 255, 0.25);
        }

        .sync-btn svg {
            width: 24px;
            height: 24px;
            fill: #fff;
            transition: transform 0.6s ease;
        }

        .sync-btn.loading svg {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* استایل برای پیام‌های شوخ‌طبعانه */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 0.9rem;
            z-index: 10000;
            display: none;
            animation: fadeInOut 3s forwards;
            white-space: nowrap;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; bottom: 80px; }
            15% { opacity: 1; bottom: 100px; }
            85% { opacity: 1; bottom: 100px; }
            100% { opacity: 0; bottom: 120px; }
        }

    </style>
</head>
<body class="day-theme">

    <div class="sync-btn" id="syncButton" onclick="handleSync()">
        <svg viewBox="0 0 24 24">
            <path d="M17.65,6.35C16.2,4.9 14.21,4 12,4A8,8 0 0,0 4,12A8,8 0 0,0 12,20C15.73,20 18.84,17.45 19.73,14H17.65C16.83,16.33 14.61,18 12,18A6,6 0 0,1 6,12A6,6 0 0,1 12,6C13.66,6 15.14,6.69 16.22,7.78L13,11H20V4L17.65,6.35Z" />
        </svg>
    </div>

    <div id="toast" class="toast"></div>

    <div class="sky-elements" id="skyElements">
        <div class="moon"></div>
    </div>

    <div class="container" id="mainContainer">
        <div class="pages-wrapper" id="pagesWrapper">
            <!-- Pages will be rendered here -->
        </div>
        <div class="page-indicators" id="pageIndicators"></div>
    </div>

    <div id="settingsPanel" class="settings-panel">
        <h3 style="margin-top: 0; text-align: center;">تنظیمات میز کار</h3>
        <div class="settings-row">
            <span>اندازه آیکون‌ها</span>
            <input type="range" min="40" max="80" value="60" class="slider" id="iconScaleSlider">
        </div>
        <div class="settings-row">
            <span>حالت آزادانه</span>
            <label class="switch">
                <input type="checkbox" id="freeModeToggle" checked>
                <span class="slider-round"></span>
            </label>
        </div>
        <button onclick="closeSettings()" style="width: 100%; padding: 10px; border-radius: 15px; border: none; background: #3b82f6; color: white; font-weight: bold;">تایید</button>
    </div>

    <div class="modal-overlay" id="modalOverlay" onclick="closeFolder(event)">
        <div class="folder-modal" onclick="event.stopPropagation()">
            <div class="folder-header">
                <input type="text" class="folder-name-input" id="folderNameInput" placeholder="نام پوشه...">
                <div class="color-presets">
                    <div class="color-dot" style="background: rgba(255,255,255,0.2);" data-color="rgba(255,255,255,0.2)"></div>
                    <div class="color-dot" style="background: rgba(255, 0, 0, 0.3);" data-color="rgba(255, 0, 0, 0.3)"></div>
                    <div class="color-dot" style="background: rgba(0, 255, 0, 0.3);" data-color="rgba(0, 255, 0, 0.3)"></div>
                    <div class="color-dot" style="background: rgba(0, 0, 255, 0.3);" data-color="rgba(0, 0, 255, 0.3)"></div>
                    <input type="color" id="folderColorPicker" style="width: 24px; height: 24px; border: none; padding: 0; background: none;">
                </div>
            </div>
            <div class="folder-grid" id="folderGrid">
                <!-- Folder items -->
            </div>
        </div>
    </div>

    <script>
        const DEFAULT_APPS = [
            { id: 'gym', title: 'Activity', icon: 'gym/icon-192.png', url: 'gym/index.html' },
            { id: 'gold', title: 'ثبت درصد ۱', icon: 'gold/icon-192.png', url: 'gold/index.html' },
            { id: 'profit', title: 'محاسبه گر سود', icon: 'profit-calculator/icon-192.png', url: 'profit-calculator/index.html' }
        ];

        let state = {
            apps: [],
            layout: [],
            currentPage: 0,
            isEditing: false,
            freeMode: true,
            iconSize: 60,
            folders: {}
        };

        const STORAGE_KEY = 'portal_v3_state';

        function loadState() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try {
                    state = { ...state, ...JSON.parse(saved) };
                } catch(e) {
                    console.error("Failed to load state", e);
                    state.apps = [...DEFAULT_APPS];
                }
            } else {
                state.apps = [...DEFAULT_APPS];
            }

            if (!state.layout || state.layout.length === 0) {
                initializeLayout();
            }

            document.documentElement.style.setProperty('--icon-size', `${state.iconSize}px`);
            document.getElementById('iconScaleSlider').value = state.iconSize;
            document.getElementById('freeModeToggle').checked = state.freeMode;
        }

        function saveState() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        }

        function updateTheme() {
            const hour = new Date().getHours();
            const isNight = hour < 6 || hour >= 18;
            const body = document.body;
            const sky = document.getElementById('skyElements');

            if (isNight) {
                body.classList.remove('day-theme');
                body.classList.add('night-theme');
                generateStars(sky);
            } else {
                body.classList.remove('night-theme');
                body.classList.add('day-theme');
                clearStars();
            }
        }

        function generateStars(container) {
            if (document.querySelectorAll('.star').length > 0) return;
            for (let i = 0; i < 50; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 3 + 1;
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                star.style.top = `${Math.random() * 100}%`;
                star.style.left = `${Math.random() * 100}%`;
                star.style.setProperty('--duration', `${Math.random() * 3 + 2}s`);
                star.style.animationDelay = `${Math.random() * 5}s`;
                container.appendChild(star);
            }
        }

        function clearStars() {
            document.querySelectorAll('.star').forEach(s => s.remove());
        }

        updateTheme();
        setInterval(updateTheme, 60000);

        function initializeLayout() {
            state.layout = [];
            const cols = 3;
            let count = 0;

            state.apps.forEach(app => {
                const inFolder = Object.values(state.folders).some(f => f.appIds.includes(app.id));
                if (!inFolder) {
                    state.layout.push({
                        id: app.id,
                        type: 'app',
                        page: 0,
                        row: Math.floor(count / cols),
                        col: count % cols
                    });
                    count++;
                }
            });

            Object.keys(state.folders).forEach(fid => {
                state.layout.push({
                    id: fid,
                    type: 'folder',
                    page: 0,
                    row: Math.floor(count / cols),
                    col: count % cols
                });
                count++;
            });
            saveState();
        }

        function renderPages(withAnimation = false) {
            const wrapper = document.getElementById('pagesWrapper');
            const indicators = document.getElementById('pageIndicators');
            wrapper.innerHTML = '';
            indicators.innerHTML = '';

            const containerWidth = window.innerWidth;
            const containerHeight = window.innerHeight * 0.8;
            const cols = Math.floor(containerWidth / (state.iconSize + 40));
            const rows = Math.floor(containerHeight / (state.iconSize + 60));

            document.documentElement.style.setProperty('--cols', cols);
            document.documentElement.style.setProperty('--rows', rows);

            const maxPage = state.layout.reduce((max, item) => Math.max(max, item.page), 0);
            const pageCount = Math.max(1, maxPage + (state.isEditing ? 2 : 1));

            for (let p = 0; p < pageCount; p++) {
                const page = document.createElement('div');
                page.className = 'page';
                page.dataset.page = p;

                const overlay = document.createElement('div');
                overlay.className = 'grid-overlay';
                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        const cell = document.createElement('div');
                        cell.className = 'grid-cell';
                        overlay.appendChild(cell);
                    }
                }
                page.appendChild(overlay);

                const preview = document.createElement('div');
                preview.className = 'drop-preview';
                page.appendChild(preview);

                const pageLayout = state.layout.filter(item => item.page === p);
                pageLayout.forEach((item, idx) => {
                    let dataItem;
                    if (item.type === 'app') {
                        dataItem = { type: 'app', data: state.apps.find(a => a.id === item.id) };
                    } else {
                        dataItem = { type: 'folder', id: item.id, data: state.folders[item.id] };
                    }

                    if (dataItem && dataItem.data) {
                        const el = createItemElement(dataItem);
                        el.style.gridRowStart = item.row + 1;
                        el.style.gridColumnStart = item.col + 1;

                        if (withAnimation) {
                            el.classList.add('fly-in');
                            const rx = (Math.random() - 0.5) * 1000;
                            const ry = (Math.random() - 0.5) * 1000;
                            el.style.setProperty('--tw-tx', rx + 'px');
                            el.style.setProperty('--tw-ty', ry + 'px');
                            el.style.animationDelay = (idx * 0.05) + 's';
                        }
                        page.appendChild(el);
                    }
                });

                wrapper.appendChild(page);

                const dot = document.createElement('div');
                dot.className = `dot ${p === state.currentPage ? 'active' : ''}`;
                dot.onclick = () => goToPage(p);
                indicators.appendChild(dot);
            }

            wrapper.style.transform = `translateX(${state.currentPage * 100}%)`;
        }

        function createItemElement(item) {
            if (item.type === 'app') {
                const app = item.data;
                const card = document.createElement('div');
                card.className = 'app-card';
                card.dataset.id = app.id;
                card.dataset.type = 'app';
                card.dataset.url = app.url;

                const iconDiv = document.createElement('div');
                iconDiv.className = 'app-icon';
                const img = document.createElement('img');
                img.src = app.icon;
                iconDiv.appendChild(img);

                const titleDiv = document.createElement('div');
                titleDiv.className = 'app-title';
                titleDiv.innerText = app.title;

                card.appendChild(iconDiv);
                card.appendChild(titleDiv);

                setupItemEvents(card);
                return card;
            } else {
                const folder = item.data;
                const card = document.createElement('div');
                card.className = 'app-card folder';
                card.dataset.id = item.id;
                card.dataset.type = 'folder';
                card.style.background = folder.color || 'rgba(255,255,255,0.2)';

                folder.appIds.slice(0, 4).forEach(appId => {
                    const app = state.apps.find(a => a.id === appId);
                    if (app) {
                        const mini = document.createElement('div');
                        mini.className = 'folder-mini-icon';
                        const img = document.createElement('img');
                        img.src = app.icon;
                        mini.appendChild(img);
                        card.appendChild(mini);
                    }
                });

                const titleDiv = document.createElement('div');
                titleDiv.className = 'app-title';
                titleDiv.style.position = 'absolute';
                titleDiv.style.bottom = '-20px';
                titleDiv.innerText = folder.title || 'پوشه';
                card.appendChild(titleDiv);

                setupItemEvents(card);
                return card;
            }
        }

        let startX = null, startY = null, isSwiping = false;
        let lastTap = 0;
        let tapTimer = null;
        let dragItem = null;
        let dragOffsetX = 0;
        let dragOffsetY = 0;
        let pressTimer = null;
        const mainContainer = document.getElementById('mainContainer');

        mainContainer.addEventListener('pointerdown', e => {
            startX = e.clientX;
            startY = e.clientY;
            isSwiping = false;

            if (e.target.closest('.app-card')) return;

            if (!state.isEditing) {
                clearTimeout(pressTimer);
                pressTimer = setTimeout(() => {
                    openSettings();
                }, 800);
            }
        });

        mainContainer.addEventListener('pointermove', e => {
            if (startX === null) return;
            const diffX = e.clientX - startX;
            const diffY = e.clientY - startY;

            if (Math.abs(diffX) > 15 || Math.abs(diffY) > 15) {
                isSwiping = true;
                clearTimeout(pressTimer);
            }

            if (!isSwiping) return;
            if (Math.abs(diffX) > Math.abs(diffY)) {
                e.preventDefault();
            }
        });

        mainContainer.addEventListener('pointerup', e => {
            clearTimeout(pressTimer);
            const sx = startX;
            startX = null;
            startY = null;
            if (!isSwiping || sx === null) return;

            const diffX = e.clientX - sx;
            if (Math.abs(diffX) > 50) {
                if (diffX > 0) {
                    const wrapper = document.getElementById('pagesWrapper');
                    if (state.currentPage < wrapper.children.length - 1) goToPage(state.currentPage + 1);
                } else if (diffX < 0 && state.currentPage > 0) {
                    goToPage(state.currentPage - 1);
                }
            }
            isSwiping = false;
        });

        function setupItemEvents(el) {
            el.addEventListener('pointerdown', (e) => {
                const now = Date.now();
                const isDoubleTap = (now - lastTap < 300);
                lastTap = now;

                if (isDoubleTap) {
                    clearTimeout(tapTimer);
                    tapTimer = null;
                    clearTimeout(pressTimer); // Cancel settings on double-tap
                    toggleEditMode();
                    return;
                }

                if (state.isEditing) {
                    if (activeFolderId) closeFolder(null, true);
                    startDragging(e, el);
                } else {
                    clearTimeout(pressTimer);
                    pressTimer = setTimeout(() => {
                        openSettings();
                    }, 800);
                }
            });

            el.addEventListener('click', (e) => {
                if (!state.isEditing && !isSwiping && !dragItem) {
                    clearTimeout(pressTimer); // Cancel settings on simple click
                    clearTimeout(tapTimer);
                    tapTimer = setTimeout(() => {
                        if (el.dataset.type === 'app' && el.dataset.url) {
                            window.location.href = el.dataset.url;
                        } else if (el.dataset.type === 'folder') {
                            openFolder(el.dataset.id);
                        }
                    }, 250);
                }
            });

            el.addEventListener('pointermove', handlePointerMove);
            el.addEventListener('pointerup', handlePointerUp);
            el.addEventListener('pointercancel', handlePointerUp);
        }

        function startDragging(e, el) {
            dragItem = el;
            const rect = el.getBoundingClientRect();
            dragOffsetX = e.clientX - rect.left;
            dragOffsetY = e.clientY - rect.top;

            dragItem.classList.add('dragging');
            dragItem.style.left = `${e.clientX - dragOffsetX}px`;
            dragItem.style.top = `${e.clientY - dragOffsetY}px`;
            dragItem.setPointerCapture(e.pointerId);
        }

        function handlePointerMove(e) {
            if (!dragItem) {
                clearTimeout(pressTimer);
                return;
            }

            const x = e.clientX;
            const y = e.clientY;
            dragItem.style.left = `${x - dragOffsetX}px`;
            dragItem.style.top = `${y - dragOffsetY}px`;

            updateDropPreview(x, y);

            if (x < 30 && state.currentPage > 0) {
                 throttle(() => goToPage(state.currentPage - 1), 1000);
            } else if (x > window.innerWidth - 30) {
                 throttle(() => {
                    const wrapper = document.getElementById('pagesWrapper');
                    if (state.currentPage < wrapper.children.length - 1) {
                        goToPage(state.currentPage + 1);
                    }
                 }, 1000);
            }
        }

        function updateDropPreview(x, y) {
            const pageEl = document.querySelectorAll('.page')[state.currentPage];
            if (!pageEl) return;
            const preview = pageEl.querySelector('.drop-preview');
            const pageRect = pageEl.getBoundingClientRect();
            const cols = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--cols'));
            const rows = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--rows'));

            const relativeX = x - pageRect.left;
            const relativeY = y - pageRect.top;

            let col = Math.floor(relativeX / (pageRect.width / cols));
            col = (cols - 1) - col;
            const row = Math.floor(relativeY / (pageRect.height / rows));

            if (col >= 0 && col < cols && row >= 0 && row < rows) {
                const cellW = pageRect.width / cols;
                const cellH = pageRect.height / rows;
                preview.style.display = 'block';
                preview.style.width = `${cellW - 20}px`;
                preview.style.height = `${cellH - 20}px`;
                const visualCol = (cols - 1) - col;
                preview.style.left = `${visualCol * cellW + 10}px`;
                preview.style.top = `${row * cellH + 10}px`;
            } else {
                preview.style.display = 'none';
            }
        }

        let throttleTimer = null;
        function throttle(callback, time) {
            if (throttleTimer) return;
            throttleTimer = true;
            setTimeout(() => {
                callback();
                throttleTimer = false;
            }, time);
        }

        function handlePointerUp(e) {
            clearTimeout(pressTimer);
            if (!dragItem) return;

            const x = e.clientX;
            const y = e.clientY;

            document.querySelectorAll('.drop-preview').forEach(p => p.style.display = 'none');

            dragItem.classList.remove('dragging');
            dragItem.style.left = '';
            dragItem.style.top = '';
            dragItem.releasePointerCapture(e.pointerId);

            finalizeMove(dragItem, x, y);
            dragItem = null;
        }

        function createFolder(appId1, appId2) {
            if (appId1.startsWith('folder_') || appId2.startsWith('folder_')) return null;

            const folderId = 'folder_' + Date.now();
            state.folders[folderId] = {
                title: 'پوشه جدید',
                color: 'rgba(255,255,255,0.2)',
                appIds: [appId1, appId2]
            };
            saveState();
            return folderId;
        }

        function addToFolder(appId, folderId) {
            if (!state.folders[folderId].appIds.includes(appId)) {
                state.folders[folderId].appIds.push(appId);
                saveState();
            }
        }

        let activeFolderId = null;
        function openFolder(folderId) {
            if (state.isEditing) return;
            if (dragItem) return;
            activeFolderId = folderId;
            const folder = state.folders[folderId];
            document.getElementById('modalOverlay').style.display = 'flex';
            document.getElementById('folderNameInput').value = folder.title;
            renderFolderGrid(folderId);
        }

        function renderFolderGrid(folderId) {
            const grid = document.getElementById('folderGrid');
            grid.innerHTML = '';
            const folder = state.folders[folderId];
            folder.appIds.forEach(appId => {
                const app = state.apps.find(a => a.id === appId);
                if (app) {
                    const item = createItemElement({ type: 'app', data: app });
                    grid.appendChild(item);
                }
            });
        }

        function closeFolder(e, noRender = false) {
            if (e && e.target !== document.getElementById('modalOverlay')) return;
            document.getElementById('modalOverlay').style.display = 'none';
            activeFolderId = null;
            if (!noRender) renderPages();
        }

        document.getElementById('folderNameInput').oninput = (e) => {
            if (activeFolderId) {
                state.folders[activeFolderId].title = e.target.value;
                saveState();
            }
        };

        document.querySelectorAll('.color-dot').forEach(dot => {
            dot.onclick = () => {
                if (activeFolderId) {
                    state.folders[activeFolderId].color = dot.dataset.color;
                    saveState();
                    renderPages();
                }
            };
        });

        document.getElementById('folderColorPicker').oninput = (e) => {
            if (activeFolderId) {
                state.folders[activeFolderId].color = e.target.value;
                saveState();
                renderPages();
            }
        };

        function finalizeMove(item, x, y) {
            const targets = document.elementsFromPoint(x, y);
            const targetCard = targets.find(t => t.classList.contains('app-card') && t !== item && !t.classList.contains('dragging'));
            const itemId = item.dataset.id;

            const pageEl = document.querySelectorAll('.page')[state.currentPage];
            const pageRect = pageEl.getBoundingClientRect();
            const cols = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--cols'));
            const rows = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--rows'));

            const relativeX = x - pageRect.left;
            const relativeY = y - pageRect.top;

            let col = Math.floor(relativeX / (pageRect.width / cols));
            col = (cols - 1) - col;
            const row = Math.floor(relativeY / (pageRect.height / rows));

            if (targetCard) {
                const targetId = targetCard.dataset.id;
                const rect = targetCard.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                const dist = Math.hypot(x - centerX, y - centerY);

                if (dist < rect.width / 3) {
                    if (targetCard.dataset.type === 'folder') {
                        removeFromFolder(itemId);
                        addToFolder(itemId, targetId);
                        state.layout = state.layout.filter(l => l.id !== itemId);
                    } else {
                        removeFromFolder(itemId);
                        const newFolderId = createFolder(itemId, targetId);
                        if (newFolderId) {
                            const targetIdx = state.layout.findIndex(l => l.id === targetId);
                            if (targetIdx !== -1) {
                                const { page, row, col } = state.layout[targetIdx];
                                state.layout[targetIdx] = { id: newFolderId, type: 'folder', page, row, col };
                            }
                            state.layout = state.layout.filter(l => l.id !== itemId);
                        }
                    }
                } else {
                    swapItems(itemId, col, row);
                }
            } else {
                if (col >= 0 && col < cols && row >= 0 && row < rows) {
                    swapItems(itemId, col, row);
                }
            }
            saveState();
            renderPages();
        }

        function swapItems(itemId, newCol, newRow) {
            const existingIdx = state.layout.findIndex(l => l.page === state.currentPage && l.row === newRow && l.col === newCol);
            const currentIdx = state.layout.findIndex(l => l.id === itemId);

            removeFromFolder(itemId);

            if (existingIdx !== -1 && state.layout[existingIdx].id !== itemId) {
                const existing = state.layout[existingIdx];
                if (currentIdx !== -1) {
                    const current = state.layout[currentIdx];
                    const tempPage = existing.page;
                    const tempRow = existing.row;
                    const tempCol = existing.col;

                    existing.page = current.page;
                    existing.row = current.row;
                    existing.col = current.col;

                    current.page = tempPage;
                    current.row = tempRow;
                    current.col = tempCol;
                } else {
                    const empty = findFirstEmptySpot();
                    existing.page = empty.page;
                    existing.row = empty.row;
                    existing.col = empty.col;
                    const itemType = itemId.startsWith('folder_') ? 'folder' : 'app';
                    state.layout.push({ id: itemId, type: itemType, page: state.currentPage, row: newRow, col: newCol });
                }
            } else if (currentIdx !== -1) {
                state.layout[currentIdx].page = state.currentPage;
                state.layout[currentIdx].row = newRow;
                state.layout[currentIdx].col = newCol;
            } else {
                const itemType = itemId.startsWith('folder_') ? 'folder' : 'app';
                state.layout.push({ id: itemId, type: itemType, page: state.currentPage, row: newRow, col: newCol });
            }
        }

        function removeFromFolder(appId) {
            let changed = false;
            Object.keys(state.folders).forEach(fid => {
                const folder = state.folders[fid];
                const originalLength = folder.appIds.length;
                folder.appIds = folder.appIds.filter(id => id !== appId);
                if (folder.appIds.length !== originalLength) changed = true;

                if (folder.appIds.length < 1) {
                    delete state.folders[fid];
                    state.layout = state.layout.filter(l => l.id !== fid);
                }
            });
            if (changed) saveState();
            return changed;
        }

        function findFirstEmptySpot() {
            const cols = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--cols'));
            const rows = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--rows'));
            for (let p = 0; ; p++) {
                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        if (!state.layout.some(l => l.page === p && l.row === r && l.col === c)) {
                            return { page: p, row: r, col: c };
                        }
                    }
                }
            }
        }

        function openSettings() {
            document.getElementById('settingsPanel').classList.add('open');
        }

        function closeSettings() {
            document.getElementById('settingsPanel').classList.remove('open');
            saveState();
            renderPages();
        }

        document.getElementById('iconScaleSlider').oninput = (e) => {
            state.iconSize = parseInt(e.target.value);
            document.documentElement.style.setProperty('--icon-size', `${state.iconSize}px`);
        };

        document.getElementById('freeModeToggle').onchange = (e) => {
            state.freeMode = e.target.checked;
        };

        function toggleEditMode() {
            // Cancel any pending navigation when entering edit mode
            clearTimeout(tapTimer);
            state.isEditing = !state.isEditing;
            document.body.classList.toggle('editing', state.isEditing);
            if (navigator.vibrate) navigator.vibrate(100);
            renderPages();
        }

        function goToPage(pageIndex) {
            state.currentPage = pageIndex;
            const wrapper = document.getElementById('pagesWrapper');
            wrapper.style.transform = `translateX(${pageIndex * 100}%)`;
            document.querySelectorAll('.dot').forEach((dot, idx) => {
                dot.classList.toggle('active', idx === pageIndex);
            });
            saveState();
        }

        loadState();
        renderPages(true);

        // --- مدیریت سرویس ورکر و همگام‌سازی ---

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                // پاکسازی سرویس ورکرهای قدیمی از زیرپوشه‌ها برای جلوگیری از تداخل
                navigator.serviceWorker.getRegistrations().then(registrations => {
                    for (let registration of registrations) {
                        const path = new URL(registration.scope).pathname;
                        if (path.includes('/gym/') || path.includes('/gold/') || path.includes('/profit-calculator/')) {
                            registration.unregister().then(success => {
                                if (success) console.log(`Legacy SW at ${path} unregistered.`);
                            });
                        }
                    }
                });

                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker registered!'))
                    .catch(err => console.error('SW registration failed:', err));
            });
        }

        async function handleSync() {
            const btn = document.getElementById('syncButton');
            const toast = document.getElementById('toast');

            if (btn.classList.contains('loading')) return;

            if (!navigator.onLine) {
                const jokes = [
                    "اینترنت قطعه عزیز! با کبوتر باوفا برات آپدیت بیارم؟ 🕊️",
                    "الان حتی مودمت هم خوابیده، اصرار نکن... 💤",
                    "بدون اینترنت؟ مگه جادوگری؟ اول وصل شو بعداً بزن! ✨",
                    "سیگنال نیست... داری با روح عمارت بازی می‌کنی؟ 👻"
                ];
                showToast(jokes[Math.floor(Math.random() * jokes.length)]);
                return;
            }

            btn.classList.add('loading');
            showToast("در حال نوسازی عمارت... طاقت بیار! 🏗️");

            try {
                if ('serviceWorker' in navigator) {
                    const registration = await navigator.serviceWorker.getRegistration();
                    if (registration) {
                        await registration.update();
                        setTimeout(() => {
                            window.location.reload();
                        }, 1500);
                    } else {
                        window.location.reload();
                    }
                } else {
                    window.location.reload();
                }
            } catch (err) {
                console.error("Update failed:", err);
                btn.classList.remove('loading');
                showToast("یه مشکلی پیش اومد، ولی بیخیال، دوباره امتحان کن!");
            }
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.style.display = 'block';

            // بازنشانی انیمیشن
            toast.style.animation = 'none';
            toast.offsetHeight; /* trigger reflow */
            toast.style.animation = null;

            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }
    </script>
</body>
