<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1e3a8a">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <title>عمارت دیجیتال</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-color: #ffffff;
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            --accent-blue: #1e3a8a;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at center, #1e3a8a 0%, #0f172a 100%);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: var(--text-color);
            overflow: hidden;
        }

        /* لایه شیشه‌ای مات روی کل صفحه */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .app-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 100%;
        }

        .app-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 15px 5px;
            text-align: center;
            text-decoration: none;
            color: inherit;
            box-shadow: var(--shadow);
            border: 1px solid var(--glass-border);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0; /* برای شروع انیمیشن */
        }

        .app-card:hover {
            transform: scale(1.1);
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .app-card:active {
            transform: scale(0.9);
        }

        .app-icon {
            font-size: 2.2rem;
            margin-bottom: 8px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .app-icon img {
            width: 50px;
            height: 50px;
            object-fit: contain;
            border-radius: 12px;
        }

        .app-title {
            font-size: 0.85rem;
            font-weight: 500;
            white-space: nowrap;
        }

        .coming-soon {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* انیمیشن‌های پرواز از گوشه‌ها */
        @keyframes flyInTL { from { transform: translate(-100vw, -100vh); opacity: 0; } to { transform: translate(0, 0); opacity: 1; } }
        @keyframes flyInT { from { transform: translateY(-100vh); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes flyInTR { from { transform: translate(100vw, -100vh); opacity: 0; } to { transform: translate(0, 0); opacity: 1; } }
        @keyframes flyInBL { from { transform: translate(-100vw, 100vh); opacity: 0; } to { transform: translate(0, 0); opacity: 1; } }
        @keyframes flyInB { from { transform: translateY(100vh); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes flyInBR { from { transform: translate(100vw, 100vh); opacity: 0; } to { transform: translate(0, 0); opacity: 1; } }

        .fly-tl { animation: flyInTL 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards; }
        .fly-t  { animation: flyInT 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards; }
        .fly-tr { animation: flyInTR 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards; }
        .fly-bl { animation: flyInBL 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards; }
        .fly-b  { animation: flyInB 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards; }
        .fly-br { animation: flyInBR 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards; }

        @media (max-width: 400px) {
            .app-grid { gap: 10px; }
            .app-icon { font-size: 1.8rem; }
            .app-title { font-size: 0.75rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="app-grid">
            <!-- برنامه ورزش -->
            <a href="gym/index.html" class="app-card fly-tl">
                <div class="app-icon">
                    <img src="gym/icon-192.png" alt="ورزش">
                </div>
                <div class="app-title">ورزش</div>
            </a>

            <!-- جای خالی برای برنامه‌های بعدی -->
            <div class="app-card coming-soon fly-t">
                <div class="app-icon">🛠️</div>
                <div class="app-title">بزودی...</div>
            </div>

            <div class="app-card coming-soon fly-tr">
                <div class="app-icon">🧪</div>
                <div class="app-title">بزودی...</div>
            </div>

            <div class="app-card coming-soon fly-bl">
                <div class="app-icon">🌙</div>
                <div class="app-title">بزودی...</div>
            </div>

            <div class="app-card coming-soon fly-b">
                <div class="app-icon">🍎</div>
                <div class="app-title">بزودی...</div>
            </div>

            <div class="app-card coming-soon fly-br">
                <div class="app-icon">📈</div>
                <div class="app-title">بزودی...</div>
            </div>
        </div>
    </div>

    <script>
        // ثبت سرویس ورکر برای پورتال مادر
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Portal SW Registered'))
                    .catch(err => console.log('Portal SW Failed', err));
            });
        }
    </script>

</body>
</html>
