<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1e3a8a">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="../apple-touch-icon.png">
    <link rel="icon" href="../favicon.ico" type="image/x-icon">
    <title>دیدبان درصد ها</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.12);
            --glass-border: rgba(255, 255, 255, 0.2);
            --opaque-white: rgba(255, 255, 255, 0.95);
            --text-color: #ffffff;
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            --primary-light: #60a5fa;
            --positive-color: #34d399;
            --negative-color: #f87171;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            color: var(--text-color);
            background: radial-gradient(circle at center, #1e3a8a 0%, #020617 100%);
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
            -webkit-user-select: none;
        }

        /* افکت شیشه‌ای مات روی کل پس‌زمینه */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: -2;
        }

        .sky-elements {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            overflow: hidden;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0;
            animation: twinkle var(--duration) infinite ease-in-out;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.2); }
        }

        header {
            width: 100%;
            max-width: 500px;
            padding: 20px 20px 10px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .back-btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-color);
            padding: 8px 16px;
            border-radius: 16px;
            text-decoration: none;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: background 0.3s, transform 0.2s;
        }

        .back-btn:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.2);
        }

        .title-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .title-container h1 {
            font-size: 1.3rem;
            margin: 0;
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .tab-container {
            width: 100%;
            max-width: 460px;
            display: flex;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 20px;
            padding: 4px;
            margin: 10px 0 20px;
            box-sizing: border-box;
            border: 1px solid var(--glass-border);
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            padding: 12px;
            border-radius: 16px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .tab-btn.active {
            background: var(--glass-bg);
            color: #ffffff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border: 1px solid var(--glass-border);
        }

        .content-section {
            width: 100%;
            max-width: 500px;
            padding: 0 15px 30px;
            box-sizing: border-box;
            display: none;
            animation: fadeIn 0.4s ease forwards;
        }

        .content-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* کارت‌های شیشه‌ای */
        .monitor-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 24px;
            padding: 18px 20px;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
            border: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
            transition: transform 0.3s, border-color 0.3s;
        }

        .monitor-card:hover {
            border-color: rgba(255, 255, 255, 0.35);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .app-badge {
            background: rgba(255, 255, 255, 0.15);
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .time-ago {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 500;
        }

        .card-body {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .percent-value {
            font-size: 2.2rem;
            font-weight: 800;
            direction: ltr;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        .percent-value.positive {
            color: var(--positive-color);
        }

        .percent-value.negative {
            color: var(--negative-color);
        }

        .percent-value.none {
            color: rgba(255,255,255,0.4);
            font-size: 1.4rem;
            font-weight: 500;
        }

        .date-details {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 4px;
        }

        .solar-date {
            font-size: 0.9rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
        }

        .solar-time {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.6);
            font-family: monospace;
        }

        /* استایل‌های تب تحلیل سود */
        .stats-summary-card {
            background: linear-gradient(135deg, rgba(96, 165, 250, 0.15) 0%, rgba(124, 58, 237, 0.15) 100%);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow);
            text-align: center;
        }

        .stats-summary-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 15px;
            color: var(--primary-light);
        }

        .avg-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .avg-item-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 12px;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .avg-item-title {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 600;
        }

        .avg-item-value {
            font-size: 1.25rem;
            font-weight: 700;
            direction: ltr;
        }

        .avg-item-value.positive {
            color: var(--positive-color);
        }

        .avg-item-value.negative {
            color: var(--negative-color);
        }

        .no-data-hint {
            text-align: center;
            padding: 40px 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        /* فوتر شیک */
        footer {
            margin-top: auto;
            padding: 20px;
            text-align: center;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.4);
        }
    </style>
</head>
<body>

    <div class="sky-elements" id="skyElements"></div>

    <header>
        <div class="title-container">
            <span style="font-size: 1.8rem;">🖥️</span>
            <h1>دیدبان درصد ها</h1>
        </div>
        <a href="../index.html" class="back-btn">
            <span>🔙</span>
            <span>برگشت</span>
        </a>
    </header>

    <div class="tab-container">
        <button class="tab-btn active" onclick="switchTab('live-tab', this)">
            <span>🖥️</span>
            <span>دیدبان زنده</span>
        </button>
        <button class="tab-btn" onclick="switchTab('analysis-tab', this)">
            <span>📈</span>
            <span>آنالیز سود روزانه</span>
        </button>
    </div>

    <!-- تب ۱: دیدبان زنده -->
    <div id="live-tab" class="content-section active">
        <div id="live-cards-container">
            <!-- کارت‌ها به صورت پویا با JS ساخته میشن -->
        </div>
    </div>

    <!-- تب ۲: آنالیز میانگین‌ها -->
    <div id="analysis-tab" class="content-section">
        <div class="stats-summary-card">
            <div class="stats-summary-title">📈 مقایسه میانگین‌های روزانه سود</div>
            <div class="avg-grid" id="avg-analysis-container">
                <!-- آنالیز سودها به صورت پویا ساخته میشن -->
            </div>
        </div>
    </div>

    <footer>
        🖥️ مانیتورینگ متمرکز عمارت دیجیتال · نسخه ۱.۰
    </footer>

    <script>
        // تولید ستاره‌ها برای پس‌زمینه ستاره‌ای شب
        function generateStars() {
            const container = document.getElementById('skyElements');
            for (let i = 0; i < 40; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 2.5 + 1;
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                star.style.top = `${Math.random() * 100}%`;
                star.style.left = `${Math.random() * 100}%`;
                star.style.setProperty('--duration', `${Math.random() * 3 + 2}s`);
                star.style.animationDelay = `${Math.random() * 5}s`;
                container.appendChild(star);
            }
        }
        generateStars();

        // تابع تغییر تب
        function switchTab(tabId, btn) {
            document.querySelectorAll('.content-section').forEach(sec => sec.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');
        }

        // تبدیل زمان ثبت به ساختار «چند وقت پیش» به صورت فارسی و دقیق
        function formatTimeAgo(timestamp) {
            if (!timestamp) return '';
            const diffMs = Date.now() - timestamp;
            const diffSeconds = Math.floor(diffMs / 1000);
            const diffMinutes = Math.floor(diffSeconds / 60);
            const diffHours = Math.floor(diffMinutes / 60);
            const diffDays = Math.floor(diffHours / 24);

            if (diffSeconds < 60) {
                return 'همین الان';
            } else if (diffMinutes < 60) {
                return `${diffMinutes} دقیقه پیش`;
            } else if (diffHours < 24) {
                return `${diffHours} ساعت پیش`;
            } else if (diffDays === 1) {
                return 'دیروز';
            } else if (diffDays === 2) {
                return 'پریروز';
            } else {
                return `${diffDays} روز پیش`;
            }
        }

        // فرمت کردن تاریخ و ساعت دقیق شمسی
        function formatPersianDateTime(timestamp) {
            if (!timestamp) return { date: '', time: '' };
            try {
                // با فرستادن لوکال fa-IR، خروجی فارسی برمی‌گردونه
                // ما ترجیح می‌دیم شماره‌ها رو همون انگلیسی شیک (RTL-aware) نگه داریم یا طبق تنظیمات
                const formatterDate = new Intl.DateTimeFormat('fa-IR-u-nu-latn', {
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit'
                });
                const formatterTime = new Intl.DateTimeFormat('fa-IR-u-nu-latn', {
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit'
                });

                const d = new Date(timestamp);
                return {
                    date: formatterDate.format(d),
                    time: formatterTime.format(d)
                };
            } catch (e) {
                return { date: 'خطا در تاریخ', time: '' };
            }
        }

        // استخراج و تحلیل داده‌ها از LocalStorage
        function getAppPercentData() {
            const result = [];

            // ۱. ثبت درصد 1
            let app1Raw = localStorage.getItem("percents");
            let app1Data = [];
            try { app1Data = JSON.parse(app1Raw) || []; } catch(e) {}
            result.push({ id: 1, title: "ثبت درصد 1", data: app1Data });

            // ۲. ثبت درصد 2
            let app2Raw = localStorage.getItem("kian_percents");
            let app2Data = [];
            try { app2Data = JSON.parse(app2Raw) || []; } catch(e) {}
            result.push({ id: 2, title: "ثبت درصد 2", data: app2Data });

            // ۳. ثبت درصد 3
            let app3Raw = localStorage.getItem("stock____________tas9yl_new_unified");
            let app3Data = [];
            try {
                if (app3Raw) {
                    let parsed = JSON.parse(app3Raw);
                    app3Data = parsed.percents || [];
                } else {
                    // بکاپ از کلید قدیمی در صورت لزوم
                    let legacy = localStorage.getItem("stock____________tas9ylpercents");
                    if (legacy) app3Data = JSON.parse(legacy) || [];
                }
            } catch(e) {}
            result.push({ id: 3, title: "ثبت درصد 3", data: app3Data });

            // ۴. ثبت درصد 4
            let app4Raw = localStorage.getItem("mofid_atie_percents");
            let app4Data = [];
            try { app4Data = JSON.parse(app4Raw) || []; } catch(e) {}
            result.push({ id: 4, title: "ثبت درصد 4", data: app4Data });

            // ۵. ثبت درصد 5
            let app5Raw = localStorage.getItem("energy_fund_synergy");
            let app5Data = [];
            try {
                if (app5Raw) {
                    let parsed = JSON.parse(app5Raw);
                    app5Data = parsed.percents || [];
                }
            } catch(e) {}
            result.push({ id: 5, title: "ثبت درصد 5", data: app5Data });

            return result;
        }

        // محاسبه میانگین سود روزانه بر اساس لاگ‌های هر اپلیکیشن
        function calculateDailyAverage(percentsList) {
            if (!percentsList || percentsList.length === 0) return 0;

            // سود کل خطی
            let totalProfit = percentsList.reduce((s, p) => s + p.value, 0);

            let firstDate = new Date(percentsList[0].timestamp);
            let lastDate = new Date(percentsList[percentsList.length - 1].timestamp);

            // محاسبه تعداد روزهای سپری شده بین اولین و آخرین ثبت (حداقل ۱ روز)
            let daysDiff = Math.max(1, Math.ceil((lastDate - firstDate) / (1000 * 60 * 60 * 24)));

            return totalProfit / daysDiff;
        }

        // رندر کردن اطلاعات در صفحات
        function renderMonitor() {
            const appsInfo = getAppPercentData();

            // رندر تب ۱: دیدبان زنده
            const liveContainer = document.getElementById('live-cards-container');
            liveContainer.innerHTML = '';

            appsInfo.forEach(app => {
                const lastItem = app.data && app.data.length > 0 ? app.data[app.data.length - 1] : null;

                const card = document.createElement('div');
                card.className = 'monitor-card';

                if (lastItem) {
                    const timeAgoText = formatTimeAgo(lastItem.timestamp);
                    const dt = formatPersianDateTime(lastItem.timestamp);
                    const isPositive = lastItem.value >= 0;
                    const valueSign = isPositive ? '+' : '';

                    card.innerHTML = `
                        <div class="card-header">
                            <span class="app-badge">${app.title}</span>
                            <span class="time-ago">${timeAgoText}</span>
                        </div>
                        <div class="card-body">
                            <div class="date-details">
                                <span class="solar-date">📅 ${dt.date}</span>
                                <span class="solar-time">⏰ ${dt.time}</span>
                            </div>
                            <span class="percent-value ${isPositive ? 'positive' : 'negative'}">${valueSign}${lastItem.value}%</span>
                        </div>
                    `;
                } else {
                    card.innerHTML = `
                        <div class="card-header">
                            <span class="app-badge">${app.title}</span>
                            <span class="time-ago">بدون ثبت</span>
                        </div>
                        <div class="card-body" style="justify-content: center; padding: 10px 0;">
                            <span class="percent-value none">📭 هیچ درصدی ثبت نشده است</span>
                        </div>
                    `;
                }
                liveContainer.appendChild(card);
            });

            // رندر تب ۲: آنالیز سودهای روزانه
            const analysisContainer = document.getElementById('avg-analysis-container');
            analysisContainer.innerHTML = '';

            appsInfo.forEach(app => {
                const avgDaily = calculateDailyAverage(app.data);
                const hasData = app.data && app.data.length > 0;
                const isPositive = avgDaily >= 0;
                const valueSign = isPositive ? '+' : '';

                const itemCard = document.createElement('div');
                itemCard.className = 'avg-item-card';

                if (hasData) {
                    itemCard.innerHTML = `
                        <span class="avg-item-title">${app.title}</span>
                        <span class="avg-item-value ${isPositive ? 'positive' : 'negative'}">${valueSign}${avgDaily.toFixed(3)}%</span>
                    `;
                } else {
                    itemCard.innerHTML = `
                        <span class="avg-item-title">${app.title}</span>
                        <span class="avg-item-value" style="color: rgba(255,255,255,0.3); font-size: 1rem;">بدون داده</span>
                    `;
                }
                analysisContainer.appendChild(itemCard);
            });
        }

        // لود اولیه و تنظیم آپدیت دوره‌ای (مثلاً هر ۳۰ ثانیه برای بروز ماندن «زمان گذشته»)
        renderMonitor();
        setInterval(renderMonitor, 30000);
    </script>
</body>
</html>
